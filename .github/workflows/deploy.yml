name: Deploy to WordPress.org

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy to WordPress.org
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: 8.1
          tools: composer:v2
          coverage: none

      - name: Install production dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction --no-progress

      - name: Debug SVN secret availability
        run: |
          echo "Username length: ${#SVN_USERNAME}"
          echo "Password length: ${#SVN_PASSWORD}"
          echo "Plugin slug: $SLUG"
          svn info "https://plugins.svn.wordpress.org/${SLUG}/"
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: vragen-ai

      - name: WordPress.org plugin deploy
        id: deploy
        uses: 10up/action-wordpress-plugin-deploy@54bd289b8525fd23a5c365ec369185f2966529c2 # stable
        with:
          generate-zip: true
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: vragen-ai

      - name: Attach zip to GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: ${{ steps.deploy.outputs.zip-path }}
